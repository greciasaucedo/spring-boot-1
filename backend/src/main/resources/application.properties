# ═════════════════════════════════════════════════════════════
# Spring Boot Configuration — Laboratorio Partido en Vivo
# ═════════════════════════════════════════════════════════════

# Server
server.port=8080

# ═════ Base de datos: H2 (desarrollo, sin instalación) ═════
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always

# ═════ O BD: MySQL (descomenta para usar) ═════
# spring.datasource.url=jdbc:mysql://localhost:3306/partido_db
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.labpartido=DEBUG
